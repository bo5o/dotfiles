---
git:
  autoForwardBranches: none
  pagers:
    - useExternalDiffGitConfig: false # default pager
    - externalDiffCommand: difft --color=always --display=inline
gui:
  nerdFontsVersion: "3"
  showDivergenceFromBaseBranch: arrowAndNumber
  theme:
    selectedLineBgColor:
      - "#45403d"
    searchingActiveBorderColor:
      - "bold"
    optionsTextColor:
      - "#a9b665"
    defaultFgColor:
      - "#d4be98"
    cherryPickedCommitFgColor:
      - "#a9b665"
    cherryPickedCommitBgColor:
      - "#7daea3"
    activeBorderColor:
      - "bold"
    unstagedChangesColor:
      - "#ea6962"
keybinding:
  universal:
    suspendApp: <disabled>
    redo: <ctrl+z>
customCommands:
  - key: '<ctrl+v>'
    context: 'files'
    command: git diff --staged | llm -t conventional-commit | git commit -e -F -
    description: 'Commit with AI'
    output: terminal
  - key: 'b'
    description: 'Absorb staged changes into past commits'
    commandMenu:
      - key: 'b'
        context: 'files'
        command: git absorb
        description: 'Absorb (create fixup commits only)'
        output: terminal
      - key: 'r'
        context: 'files'
        command: git absorb --and-rebase
        description: 'Absorb and rebase'
        output: terminal
      - key: 'n'
        context: 'files'
        command: git absorb --dry-run
        description: 'Dry run (preview)'
        output: terminal
      - key: 'w'
        context: 'files'
        command: git absorb --whole-file --and-rebase
        description: 'Absorb whole-file and rebase'
        output: terminal
